<!-- Add this improved modal section inside the body of index.html -->
<div id="authModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modalTitle" class="text-2xl font-bold">Create Account</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
        </div>

        <div id="registerForm">
            <input id="regFullName" type="text" placeholder="Full Name" 
                   class="w-full px-4 py-3 border rounded-2xl mb-4">
            <input id="regEmail" type="email" placeholder="Email" 
                   class="w-full px-4 py-3 border rounded-2xl mb-4">
            <input id="regPassword" type="password" placeholder="Password" 
                   class="w-full px-4 py-3 border rounded-2xl mb-6">
            <button onclick="registerUser()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold">
                Register
            </button>
            <p class="text-center mt-4 text-sm text-gray-600">
                Already have an account? 
                <a href="#" onclick="switchToLogin()" class="text-indigo-600 hover:underline">Login</a>
            </p>
        </div>

        <div id="loginForm" class="hidden">
            <input id="loginEmail" type="email" placeholder="Email" 
                   class="w-full px-4 py-3 border rounded-2xl mb-4">
            <input id="loginPassword" type="password" placeholder="Password" 
                   class="w-full px-4 py-3 border rounded-2xl mb-6">
            <button onclick="loginUser()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold">
                Login
            </button>
            <p class="text-center mt-4 text-sm text-gray-600">
                No account yet? 
                <a href="#" onclick="switchToRegister()" class="text-indigo-600 hover:underline">Register</a>
            </p>
        </div>
    </div>
</div>
