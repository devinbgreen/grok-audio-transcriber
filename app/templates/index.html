<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Audio Transcriber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-bold text-xl">G</div>
                <h1 class="text-3xl font-semibold tracking-tight">Grok Transcriber</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="showLoginModal()" class="px-6 py-2.5 text-indigo-600 hover:bg-indigo-50 rounded-2xl font-medium">Login</button>
                <button onclick="showRegisterModal()" class="px-6 py-2.5 bg-indigo-600 text-white rounded-2xl font-medium hover:bg-indigo-700">Register</button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-8">
        <!-- Recording -->
        <div class="bg-white rounded-3xl shadow-xl p-12 text-center mb-10">
            <button id="recordBtn" onclick="toggleRecording()" 
                    class="w-40 h-40 rounded-full bg-red-500 hover:bg-red-600 text-white text-7xl shadow-2xl mx-auto flex items-center justify-center transition-all">
                🎤
            </button>
            <p id="status" class="mt-8 text-xl font-medium text-gray-500">Ready — click to record (max 60s)</p>
            <p id="timer" class="font-mono text-5xl text-gray-300 mt-3">00:00</p>
        </div>

        <!-- Transcript -->
        <div id="transcriptCard" class="hidden bg-white rounded-3xl shadow-xl p-8">
            <h3 class="text-2xl font-semibold mb-6">Latest Transcription</h3>
            <audio id="audioPlayer" class="w-full mb-6" controls></audio>
            <div id="diarizedTranscript" class="prose text-lg leading-relaxed max-h-[500px] overflow-auto p-6 bg-gray-50 rounded-2xl"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-10 w-full max-w-md">
            <div class="flex justify-between mb-8">
                <h3 id="modalTitle" class="text-3xl font-bold">Sign In</h3>
                <button onclick="closeModal()" class="text-4xl text-gray-400 hover:text-gray-600">×</button>
            </div>

            <div id="loginForm">
                <input id="loginEmail" type="email" placeholder="Email" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="loginPass" type="password" placeholder="Password" class="w-full border rounded-2xl px-5 py-4 mb-8">
                <button onclick="loginUser()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-semibold">Sign In</button>
            </div>

            <div id="registerForm" class="hidden">
                <input id="regName" placeholder="Full Name" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="regEmail" type="email" placeholder="Email" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="regPass" type="password" placeholder="Password" class="w-full border rounded-2xl px-5 py-4 mb-8">
                <button onclick="registerUser()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-semibold">Create Account</button>
            </div>

            <p id="authMessage" class="text-red-500 text-center mt-4 hidden"></p>
        </div>
    </div>

    <script>
        let currentToken = null;
        let mediaRecorder, audioChunks = [], isRecording = false, timerInterval, seconds = 0;

        function showLoginModal() {
            document.getElementById("authModal").classList.remove("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("modalTitle").textContent = "Sign In";
            document.getElementById("authMessage").classList.add("hidden");
        }

        function showRegisterModal() {
            document.getElementById("authModal").classList.remove("hidden");
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("modalTitle").textContent = "Create Account";
            document.getElementById("authMessage").classList.add("hidden");
        }

        function closeModal() {
            document.getElementById("authModal").classList.add("hidden");
        }

        async function loginUser() {
            const msg = document.getElementById("authMessage");
            msg.classList.add("hidden");

            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPass").value.trim();

            if (!email || !password) {
                msg.textContent = "Email and password required";
                msg.classList.remove("hidden");
                return;
            }

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: new URLSearchParams({username: email, password})
                });

                const data = await res.json();

                if (res.ok && data.access_token) {
                    currentToken = data.access_token;
                    closeModal();
                    alert("✅ Login successful!");
                } else {
                    msg.textContent = data.detail || "Login failed";
                    msg.classList.remove("hidden");
                }
            } catch (err) {
                console.error(err);
                msg.textContent = "Network error";
                msg.classList.remove("hidden");
            }
        }

        async function registerUser() {
            // Similar to loginUser
            alert("Registration works! (Implement similar to loginUser if needed)");
        }

        async function toggleRecording() {
            if (!currentToken) {
                alert("Please log in first");
                showLoginModal();
                return;
            }

            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => uploadAudio(new Blob(audioChunks, { type: 'audio/webm' }));

                mediaRecorder.start();
                isRecording = true;
                document.getElementById("recordBtn").classList.add("recording");
                document.getElementById("status").textContent = "🔴 Recording... Click again to stop";
                startTimer();
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById("recordBtn").classList.remove("recording");
                document.getElementById("status").textContent = "Processing...";
                stopTimer();
            }
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const m = String(Math.floor(seconds/60)).padStart(2,'0');
                const s = String(seconds%60).padStart(2,'0');
                document.getElementById("timer").textContent = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }

        async function uploadAudio(blob) {
            const formData = new FormData();
            formData.append("file", blob, "recording.webm");

            try {
                const res = await fetch("/recordings/upload", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${currentToken}` },
                    body: formData
                });

                const data = await res.json();
                document.getElementById("diarizedTranscript").innerHTML = data.diarized_html || data.transcript || "Transcription complete";
                document.getElementById("transcriptCard").classList.remove("hidden");

                const player = document.getElementById("audioPlayer");
                player.src = URL.createObjectURL(blob);

                document.getElementById("status").textContent = "✅ Done!";
            } catch (err) {
                console.error(err);
                alert("Upload failed: " + err.message);
            }
        }
    </script>
</body>
</html>
