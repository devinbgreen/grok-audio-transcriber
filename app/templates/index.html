<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Audio Transcriber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-5xl mx-auto">
        <nav class="bg-white shadow border-b sticky top-0 z-50">
            <div class="px-8 py-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-bold text-xl">G</div>
                    <h1 class="text-3xl font-semibold tracking-tight">Grok Transcriber</h1>
                </div>
                <button onclick="showAuthModal()" id="authBtn" class="px-6 py-2.5 bg-indigo-600 text-white rounded-2xl font-medium hover:bg-indigo-700">
                    Login / Register
                </button>
            </div>
        </nav>

        <div class="p-8">
            <!-- Recording -->
            <div class="bg-white rounded-3xl shadow-xl p-12 mb-10">
                <div class="flex flex-col items-center text-center">
                    <button id="recordBtn" onclick="toggleRecording()" 
                            class="w-40 h-40 rounded-full bg-red-500 hover:bg-red-600 text-white text-7xl shadow-2xl transition-all active:scale-95 flex items-center justify-center">
                        🎤
                    </button>
                    <p id="status" class="mt-8 text-xl font-medium text-gray-500">Ready — click to record (max 60s)</p>
                    <p id="timer" class="font-mono text-5xl text-gray-300 mt-3">00:00</p>
                </div>
            </div>

            <!-- Transcript -->
            <div id="transcriptCard" class="hidden bg-white rounded-3xl shadow-xl p-8">
                <h3 class="text-2xl font-semibold mb-6">Latest Transcription</h3>
                <audio id="audioPlayer" class="w-full mb-6" controls></audio>
                <div id="diarizedTranscript" class="prose text-lg leading-relaxed max-h-[500px] overflow-auto p-6 bg-gray-50 rounded-2xl"></div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-10 w-full max-w-md">
            <div class="flex justify-between mb-6">
                <h3 id="modalTitle" class="text-3xl font-bold">Sign Up</h3>
                <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
            </div>
            <div id="registerForm">
                <input id="regName" placeholder="Full Name" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="regEmail" type="email" placeholder="Email" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="regPass" type="password" placeholder="Password" class="w-full border rounded-2xl px-5 py-4 mb-8">
                <button onclick="registerUser()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-semibold">Create Account</button>
                <p class="text-center mt-6 text-sm">Already have an account? <a href="#" onclick="switchToLogin()" class="text-indigo-600">Log in</a></p>
            </div>
            <div id="loginForm" class="hidden">
                <input id="loginEmail" type="email" placeholder="Email" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="loginPass" type="password" placeholder="Password" class="w-full border rounded-2xl px-5 py-4 mb-8">
                <button onclick="loginUser()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-semibold">Sign In</button>
                <p class="text-center mt-6 text-sm">No account? <a href="#" onclick="switchToRegister()" class="text-indigo-600">Register</a></p>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder, audioChunks = [], currentToken = null, currentAudioUrl = null;
        let timerInterval, seconds = 0, isRecording = false;

        function showAuthModal() { document.getElementById("authModal").classList.remove("hidden"); }
        function closeModal() { document.getElementById("authModal").classList.add("hidden"); }
        function switchToLogin() {
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("modalTitle").textContent = "Sign In";
        }
        function switchToRegister() {
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("modalTitle").textContent = "Sign Up";
        }

        async function registerUser() {
            const res = await fetch("/auth/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    email: document.getElementById("regEmail").value,
                    password: document.getElementById("regPass").value,
                    full_name: document.getElementById("regName").value
                })
            });
            const data = await res.json();
            if (data.access_token) {
                currentToken = data.access_token;
                document.getElementById("authBtn").textContent = "Logged In ✓";
                closeModal();
            }
        }

        async function loginUser() {
            const res = await fetch("/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: new URLSearchParams({
                    username: document.getElementById("loginEmail").value,
                    password: document.getElementById("loginPass").value
                })
            });
            const data = await res.json();
            if (data.access_token) {
                currentToken = data.access_token;
                document.getElementById("authBtn").textContent = "Logged In ✓";
                closeModal();
            }
        }

        async function toggleRecording() {
            if (!currentToken) {
                alert("Please login first");
                showAuthModal();
                return;
            }

            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => uploadAudio(new Blob(audioChunks, { type: 'audio/webm' }));

                mediaRecorder.start();
                isRecording = true;
                document.getElementById("recordBtn").classList.add("recording");
                document.getElementById("status").textContent = "Recording...";
                startTimer();
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById("recordBtn").classList.remove("recording");
                document.getElementById("status").textContent = "Processing...";
                stopTimer();
            }
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById("timer").textContent = 
                    `${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`;
                if (seconds >= 60) toggleRecording();
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }

        async function uploadAudio(blob) {
            const formData = new FormData();
            formData.append("file", blob, "recording.webm");

            try {
                const res = await fetch("/recordings/upload", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${currentToken}` },
                    body: formData
                });

                const data = await res.json();

                if (data.diarized_html || data.segments) {
                    document.getElementById("diarizedTranscript").innerHTML = data.diarized_html || "Transcription complete!";
                    document.getElementById("transcriptCard").classList.remove("hidden");
                    
                    const player = document.getElementById("audioPlayer");
                    player.src = URL.createObjectURL(blob);
                    document.getElementById("status").textContent = "Done!";
                }
            } catch (err) {
                console.error(err);
                alert("Upload failed: " + err.message);
            }
        }
    </script>
</body>
</html>
