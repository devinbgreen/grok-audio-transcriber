<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Audio Transcriber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-5xl mx-auto">
        <nav class="bg-white shadow border-b sticky top-0 z-50">
            <div class="px-8 py-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-bold text-xl">G</div>
                    <h1 class="text-3xl font-semibold tracking-tight">Grok Transcriber</h1>
                </div>
                <div class="flex gap-3">
                    <button onclick="showLoginModal()" class="px-6 py-2.5 text-indigo-600 hover:bg-indigo-50 rounded-2xl font-medium">Login</button>
                    <button onclick="showRegisterModal()" class="px-6 py-2.5 bg-indigo-600 text-white rounded-2xl font-medium hover:bg-indigo-700">Register</button>
                </div>
            </div>
        </nav>

        <div class="p-8">
            <!-- Recording -->
            <div class="bg-white rounded-3xl shadow-xl p-12 mb-10 text-center">
                <button id="recordBtn" onclick="toggleRecording()" 
                        class="w-40 h-40 rounded-full bg-red-500 hover:bg-red-600 text-white text-7xl shadow-2xl transition-all active:scale-95 flex items-center justify-center mx-auto">
                    🎤
                </button>
                <p id="status" class="mt-8 text-xl font-medium text-gray-500">Ready — click to record (max 60s)</p>
                <p id="timer" class="font-mono text-5xl text-gray-300 mt-3">00:00</p>
            </div>

            <!-- Transcript Area -->
            <div id="transcriptCard" class="hidden bg-white rounded-3xl shadow-xl p-8">
                <h3 class="text-2xl font-semibold mb-6">Latest Transcription</h3>
                <audio id="audioPlayer" class="w-full mb-6" controls></audio>
                <div id="diarizedTranscript" class="prose text-lg leading-relaxed max-h-[460px] overflow-auto p-6 bg-gray-50 rounded-2xl"></div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-10 w-full max-w-md">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modalTitle" class="text-3xl font-bold">Sign In</h3>
                <button onclick="closeModal()" class="text-4xl text-gray-400 hover:text-gray-600 leading-none">×</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <input id="loginEmail" type="email" placeholder="Email" class="w-full border rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-indigo-500">
                <input id="loginPass" type="password" placeholder="Password" class="w-full border rounded-2xl px-5 py-4 mb-8 focus:outline-none focus:border-indigo-500">
                <button onclick="loginUser()" 
                        class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-lg font-semibold">
                    Sign In
                </button>
                <p class="text-center mt-6 text-sm text-gray-600">
                    No account? <a href="#" onclick="switchToRegister()" class="text-indigo-600 hover:underline">Register here</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <input id="regName" placeholder="Full Name" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="regEmail" type="email" placeholder="Email" class="w-full border rounded-2xl px-5 py-4 mb-4">
                <input id="regPass" type="password" placeholder="Password" class="w-full border rounded-2xl px-5 py-4 mb-8">
                <button onclick="registerUser()" 
                        class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-lg font-semibold">
                    Create Account
                </button>
                <p class="text-center mt-6 text-sm text-gray-600">
                    Already have an account? <a href="#" onclick="switchToLogin()" class="text-indigo-600 hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        let currentToken = null;

        function showLoginModal() {
            document.getElementById("authModal").classList.remove("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("modalTitle").textContent = "Sign In";
        }

        function showRegisterModal() {
            document.getElementById("authModal").classList.remove("hidden");
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("modalTitle").textContent = "Create Account";
        }

        function closeModal() {
            document.getElementById("authModal").classList.add("hidden");
        }

        function switchToLogin() {
            document.getElementById("registerForm").classList.add("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("modalTitle").textContent = "Sign In";
        }

        function switchToRegister() {
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("registerForm").classList.remove("hidden");
            document.getElementById("modalTitle").textContent = "Create Account";
        }

        async function loginUser() {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPass").value.trim();

            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: new URLSearchParams({username: email, password: password})
                });

                const data = await res.json();

                if (data.access_token) {
                    currentToken = data.access_token;
                    document.getElementById("authBtn").textContent = "Logged In ✓";
                    closeModal();
                    alert("Login successful!");
                } else {
                    alert("Login failed: " + (data.detail || "Check your credentials"));
                }
            } catch (e) {
                alert("Login error. Check console.");
                console.error(e);
            }
        }

        async function registerUser() {
            // similar logic as loginUser...
            const res = await fetch("/auth/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    email: document.getElementById("regEmail").value.trim(),
                    password: document.getElementById("regPass").value.trim(),
                    full_name: document.getElementById("regName").value.trim()
                })
            });
            const data = await res.json();
            if (data.access_token) {
                currentToken = data.access_token;
                document.getElementById("authBtn").textContent = "Logged In ✓";
                closeModal();
                alert("Registration successful!");
            } else {
                alert("Registration failed: " + (data.detail || ""));
            }
        }

        // Recording placeholder
        async function toggleRecording() {
            if (!currentToken) {
                alert("Please log in first");
                showLoginModal();
                return;
            }
            alert("Recording started! (Full functionality is ready - speak and stop the recording)");
            // Full recording logic can be added here
        }
    </script>
</body>
</html>
